# config/services.yaml

parameters:
    # On peut supprimer le paramètre OpenAI car il n'est plus utilisé
    # app.openai_key: '%env(OPENAI_API_KEY)%' 

services:
    _defaults:
        autowire: true      # Injecte automatiquement les dépendances
        autoconfigure: true # Enregistre automatiquement les services

        # On garde uniquement ce qui est nécessaire pour les autres modules
        bind:
            $apiKey: '%env(GROQ_API_KEY)%'

    # Chargement automatique des classes du dossier src/
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Enregistrement explicite de ton nouveau service métier
    App\Service\SmartContractGenerator:
        autowire: true