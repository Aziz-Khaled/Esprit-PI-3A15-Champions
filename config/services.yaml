# config/services.yaml

parameters:
    # Vous pouvez aussi définir des paramètres ici si besoin

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Injecte automatiquement les dépendances
        autoconfigure: true # Enregistre automatiquement les services (commandes, etc.)
        
        # SOLUTION : On lie la variable $apiKey globalement pour tout le projet
        bind:
            $apiKey: '%env(GROQ_API_KEY)%'

    # Chargement automatique des classes du dossier src/
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Optionnel : Si vous préférez garder une déclaration spécifique, 
    # assurez-vous qu'elle est BIEN indentée (4 espaces)
    # App\Service\AiExpertService:
    #     arguments:
    #         $apiKey: '%env(GROQ_API_KEY)%'