

parameters:
    # --- Configuration Marketplace (Images) ---
    products_images_directory: '%kernel.project_dir%/public/uploads/products'

    # --- Ta Configuration IA / Fraud API ---
    fraud_api_url: '%env(FRAUD_API_URL)%'

    twilio_sid: '%env(TWILIO_SID)%'
    twilio_token: '%env(TWILIO_TOKEN)%'
    twilio_whatsapp_from: '+14155238886'

services:
    _defaults:

        autowire: true      
        autoconfigure: true 
        
        # Centralisation des injections automatiques (Binds)
        bind:
            $fraudApiUrl: '%fraud_api_url%'
            $apiKey: '%env(GROQ_API_KEY)%'
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # --- SERVICES DU MODULE MARKETPLACE ---
    App\Service\CloudinaryService:
        arguments:
            $cloudName:  '%env(CLOUDINARY_CLOUD_NAME)%'
            $apiKey:     '%env(CLOUDINARY_API_KEY)%'
            $apiSecret:  '%env(CLOUDINARY_API_SECRET)%'

    # --- SERVICES DE LA BRANCHE DEV (FRAUDE, PAIEMENT, SECURITY) ---
    App\Service\StripeService:
        arguments:
            $stripeSecretKey: '%env(STRIPE_SECRET_KEY)%'

    App\Security\LoginSuccessHandler:
        arguments:
            $router: '@router'

    # Service pour la partie Blockchain
    App\Service\SmartContractGenerator:
        autowire: true

    # Configuration spécifique des contrôleurs pour le BackOffice
    App\Controller\BackOffice\:
        resource: '../src/Controller/backOffice/'
        tags: ['controller.service_arguments']
    App\Service\SmsVerificationService:
        arguments:
            $twilioSid:       '%env(TWILIO_SID)%'
            $twilioToken:     '%env(TWILIO_TOKEN)%'
            $twilioVerifySid: '%env(TWILIO_VERIFY_SID)%'
