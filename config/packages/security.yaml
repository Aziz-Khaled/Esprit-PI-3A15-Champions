security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        users_in_memory: { memory: null }

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: users_in_memory

    access_control:
        # CORRECTION : Le chemin doit correspondre au préfixe de votre contrôleur
        - { path: ^/front/credit-gestion, roles: PUBLIC_ACCESS }
        
        # Anciennes règles (gardées par précaution)
        - { path: ^/investisseur/marketplace, roles: PUBLIC_ACCESS }
        - { path: ^/frontOffice/credit, roles: PUBLIC_ACCESS }