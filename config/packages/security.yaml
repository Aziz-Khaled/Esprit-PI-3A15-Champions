security:
    password_hashers:
        App\Entity\Utilisateur:
            algorithm: auto
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'  # ✅ moved here

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email
        users_in_memory: { memory: null }
        # ❌ removed the misplaced line that was here

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            user_checker: App\Security\UserChecker
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: login[email]
                password_parameter: login[motDePasse]
                success_handler: App\Security\LoginSuccessHandler
                failure_path: app_login
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/login,    roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/$,        roles: PUBLIC_ACCESS }
        - { path: ^/admin/search, roles: ROLE_ADMIN }
        - { path: ^/admin,    roles: ROLE_ADMIN }
        - { path: ^/, roles: [ROLE_CLIENT, ROLE_ADMIN, ROLE_COMMERCANT, ROLE_INVESTISSEUR] }
        - { path: ^/client/sign-finish, roles: PUBLIC_ACCESS }
        - { path: ^/front/credit-gestion, roles: PUBLIC_ACCESS }
        - { path: ^/investisseur/marketplace, roles: PUBLIC_ACCESS }
        - { path: ^/frontOffice/credit, roles: PUBLIC_ACCESS }